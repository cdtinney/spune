name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spune_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spune_test
      SESSION_SECRET: ci-test-secret
      SPOT_CLIENT_ID: test-client-id
      SPOT_CLIENT_SECRET: test-client-secret
      SPOT_REDIRECT_URI: http://localhost:3000/auth/spotify/callback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --install-strategy=hoisted --loglevel=verbose

      - name: Run migration
        run: psql "$DATABASE_URL" -f packages/server/src/database/migrations/001_create_users.sql

      - name: Lint
        run: npm run server:lint

      - name: Test
        run: npm run server:test:coverage

  # TODO: Add client job after Task 6 (client rebuild with Vite + React 19)
