name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spune_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spune_test
      SESSION_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migration
        run: psql "$DATABASE_URL" -f packages/server/src/database/migrations/001_create_users.sql

      - name: Build client
        run: npm run client:build

      - name: Lint server
        run: npm run server:lint

      - name: Test server
        run: npm run server:test:coverage

      # TODO: Client tests need react-scripts/Jest upgrade (Task 6)
      # TODO: Integration tests (Puppeteer) need client rebuild (Task 6)
