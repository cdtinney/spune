services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spune
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/server/src/database/migrations/001_create_users.sql:/docker-entrypoint-initdb.d/001_create_users.sql

volumes:
  pgdata:
